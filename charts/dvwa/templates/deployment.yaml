apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dvwa.fullname" . }}
  labels:
    {{- include "dvwa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dvwa.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dvwa.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: dvwa
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: DB_SERVER
              value: "127.0.0.1"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: {{ .Values.mariadb.database | quote }}
            - name: DB_USER
              value: {{ .Values.mariadb.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dvwa.fullname" . }}-secret
                  key: mariadb-password
            - name: DVWA_NO_HTTPS
              value: "true"
            - name: DVWA_SECURITY
              value: {{ .Values.dvwa.securityLevel | quote }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /login.php
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /login.php
              port: 80
            initialDelaySeconds: 90
            periodSeconds: 20

        - name: mariadb
          image: {{ .Values.mariadb.image | quote }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dvwa.fullname" . }}-secret
                  key: mariadb-root-password
            - name: MARIADB_DATABASE
              value: {{ .Values.mariadb.database | quote }}
            - name: MARIADB_USER
              value: {{ .Values.mariadb.username | quote }}
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dvwa.fullname" . }}-secret
                  key: mariadb-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
          {{- end }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -u root -p${MARIADB_ROOT_PASSWORD}
            initialDelaySeconds: 10
            periodSeconds: 5

      {{- if .Values.persistence.enabled }}
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: {{ include "dvwa.fullname" . }}-mariadb
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
