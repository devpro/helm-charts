webapp:
  enabled: true
  name: todoblazor
  image: docker.io/devprofr/todoblazor
  port: 80
  containerPort: 8080
  healthEndpoint: /health
  tls:
    secretName: todoblazor-tls
  # optional
  tag: 1.1.22760735534    # ref. https://hub.docker.com/r/devprofr/todoblazor/tags
  replicaCount: 1
  resources: {}
    # limits:
    #   cpu: 200m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 64Mi
  extraEnv: []
    # - name: xxx
    #   value: "yyyy"
  additionalPodLabels: {}
  # mandatory
  host: ""
  db:
    # important: connectionString or connectionStringSecretKeyRef must be provided
    # connectionString: "someconnstring"
    # connectionStringSecretKeyRef:
    #   name: todoblazor-secret
    #   key: db-connectionstring
    databaseName: "todoblazor"

dotnet:
  environment: Production
  logLevels:
    default: Information
    framework: Information
    application: Information
  httpsRedirectionEnabled: false

security:
  serviceAccount:
    create: false
  rbac:
    giveClusterAdmin: false

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod

# embedded chart configuration: https://github.com/bitnami/charts/blob/main/bitnami/mongodb/values.yaml
mongodb:
  enabled: false
  global:
  #   imageRegistry: ""
  #   imagePullSecrets: []
  #   defaultStorageClass: ""
  #   storageClass: ""
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnami/mongodb     # other options: chainguard/mongodb
    tag: latest                     # IMPORTANT: latest should never be used in Production
  auth: {}
    # rootPassword: ""
    # existingSecret:
