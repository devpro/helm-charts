apiVersion: v1
kind: Service
metadata:
  name: {{ include "webgoat.fullname" . }}
  labels:
    {{- include "webgoat.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "webgoat.selectorLabels" . | nindent 4 }}
  ports:
    - name: webgoat
      protocol: TCP
      port: {{ .Values.service.webgoatPort }}
      targetPort: webgoat
    - name: webwolf
      protocol: TCP
      port: {{ .Values.service.webwolfPort }}
      targetPort: webwolf
